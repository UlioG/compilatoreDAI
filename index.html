<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Compilatore Verbale</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- ============ PANNELLO (Ribbon stile Office) ============ -->
    <header id="ribbon">
        <!-- Riga tab -->
        <nav id="ribbon-tabs">
            <div class="tabs-row">
                <button class="tab active" data-tab="unita">Unit&agrave;</button>
                <button class="tab" data-tab="vano">Vano</button>
                <button class="tab" data-tab="elemento">Elemento</button>
                <button class="tab" data-tab="posizione">Posizione</button>
                <button class="tab" data-tab="fenomeno">Fenomeno</button>
                <button class="tab" data-tab="andamento">Andamento</button>
                <button class="tab" data-tab="foto">Foto</button>
                <button class="tab" data-tab="finalizza">Finalizza</button>
            </div>
            <button id="btn-sync" title="Sincronizza">
                <span class="sync-icon">&#9729;</span>
            </button>
        </nav>

        <!-- Area comandi (cambia per ogni tab) -->
        <div id="ribbon-content">

            <!-- TAB: Unità -->
            <div class="tab-panel active" data-panel="unita">
                <div class="field-group">
                    <label>Tipo</label>
                    <div class="btn-row">
                        <button class="cmd" data-type="Abitazione">Abitazione</button>
                        <button class="cmd" data-type="Ufficio">Ufficio</button>
                        <button class="cmd" data-type="Negozio">Negozio</button>
                        <button class="cmd" data-type="Garage">Garage</button>
                        <button class="cmd" data-type="Cantina">Cantina</button>
                        <button class="cmd" data-type="Soffitta">Soffitta</button>
                        <button class="cmd" data-type="Parti Comuni">Parti Comuni</button>
                    </div>
                </div>
                <div class="field-group">
                    <label>Piano</label>
                    <input type="text" id="input-piano" placeholder="es. 2">
                </div>
                <div class="field-group">
                    <label>Sub.</label>
                    <input type="text" id="input-sub" placeholder="es. 15">
                </div>
                <div class="field-group">
                    <label>Interno</label>
                    <input type="text" id="input-interno" placeholder="es. 3">
                </div>
                <div class="field-group">
                    <label>Propriet&agrave;</label>
                    <input type="text" id="input-proprieta" placeholder="Nome Cognome">
                </div>
                <div class="field-group">
                    <button class="cmd primary" id="btn-cappello">Inserisci Cappello</button>
                </div>
            </div>

            <!-- TAB: Vano -->
            <div class="tab-panel" data-panel="vano">
                <div class="field-group">
                    <label>Destinazione</label>
                    <div class="btn-row">
                        <button class="cmd">INGRESSO</button>
                        <button class="cmd">STANZA</button>
                        <button class="cmd">DISIMPEGNO</button>
                        <button class="cmd">CORRIDOIO</button>
                        <button class="cmd">BAGNO</button>
                        <button class="cmd">SOGGIORNO</button>
                        <button class="cmd">SALONE</button>
                        <button class="cmd">CUCINA</button>
                        <button class="cmd">DEPOSITO</button>
                        <button class="cmd">UFFICIO</button>
                    </div>
                </div>
                <div class="field-group">
                    <label>Pre-check</label>
                    <div class="btn-row">
                        <button class="cmd">C/S</button>
                        <button class="cmd">NDR</button>
                        <button class="cmd">Non Visibile</button>
                        <button class="cmd">Ingombra</button>
                        <button class="cmd">Parz. Ingombra</button>
                    </div>
                </div>
            </div>

            <!-- TAB: Elemento -->
            <div class="tab-panel" data-panel="elemento">
                <div class="field-group">
                    <div class="btn-row">
                        <button class="cmd">Parete A</button>
                        <button class="cmd">Parete B</button>
                        <button class="cmd">Parete C</button>
                        <button class="cmd">Parete D</button>
                    </div>
                </div>
                <div class="field-group">
                    <div class="btn-row">
                        <button class="cmd">Soffitto</button>
                        <button class="cmd">Pavimento</button>
                        <button class="cmd">Balcone</button>
                        <button class="cmd">Cornice</button>
                    </div>
                </div>
                <div class="field-group">
                    <label>Infisso</label>
                    <div class="btn-row">
                        <button class="cmd">Finestra</button>
                        <button class="cmd">Porta finestra</button>
                        <button class="cmd">Porta interna</button>
                        <button class="cmd">Porta ingresso</button>
                        <button class="cmd">Apertura</button>
                        <button class="cmd">Apertura ad arco</button>
                        <button class="cmd">Lucernario</button>
                    </div>
                </div>
            </div>

            <!-- TAB: Posizione -->
            <div class="tab-panel" data-panel="posizione">
                <div class="field-group">
                    <label>Localizzazione diretta</label>
                    <div class="btn-row">
                        <button class="cmd">a DX</button>
                        <button class="cmd">a SX</button>
                        <button class="cmd">al centro</button>
                        <button class="cmd">nella parte apicale</button>
                        <button class="cmd">apicale a DX</button>
                        <button class="cmd">apicale a SX</button>
                        <button class="cmd">al piede</button>
                        <button class="cmd">al piede a DX</button>
                        <button class="cmd">al piede a SX</button>
                    </div>
                </div>
                <div class="field-group">
                    <label>Diedri (DD)</label>
                    <div class="btn-row">
                        <button class="cmd">DD alto DX</button>
                        <button class="cmd">DD alto SX</button>
                        <button class="cmd">DD basso DX</button>
                        <button class="cmd">DD basso SX</button>
                        <button class="cmd">DD VT</button>
                        <button class="cmd">DD OZ</button>
                        <button class="cmd">in corr. DD</button>
                    </div>
                </div>
                <div class="field-group">
                    <label>Aperture / PTB</label>
                    <div class="btn-row">
                        <button class="cmd">sopra PTB</button>
                        <button class="cmd">da PTB</button>
                        <button class="cmd">PTB varco</button>
                        <button class="cmd">PTB porta</button>
                        <button class="cmd">in corr. varco</button>
                        <button class="cmd">in corr. porta</button>
                    </div>
                </div>
                <div class="field-group">
                    <label>Altri</label>
                    <div class="btn-row">
                        <button class="cmd">da rivestimento</button>
                        <button class="cmd">da intradosso</button>
                        <button class="cmd">da travetto</button>
                    </div>
                </div>
            </div>

            <!-- TAB: Fenomeno -->
            <div class="tab-panel" data-panel="fenomeno">
                <div class="field-group">
                    <label>Fessurazioni semplici</label>
                    <div class="btn-row">
                        <button class="cmd">Filatura</button>
                        <button class="cmd">Filatura capillare</button>
                        <button class="cmd">Filatura evidente</button>
                        <button class="cmd">Filatura discontinua</button>
                        <button class="cmd">Microlesione</button>
                        <button class="cmd">Lesione</button>
                        <button class="cmd">Lesione diagonale</button>
                    </div>
                </div>
                <div class="field-group">
                    <label>Fessurazioni composte</label>
                    <div class="btn-row">
                        <button class="cmd">Serie di filature</button>
                        <button class="cmd">Filatura OZ con ram. VT</button>
                        <button class="cmd">Filatura VT con ram. OZ</button>
                        <button class="cmd">Filatura pseudo VT con laminazione</button>
                    </div>
                </div>
                <div class="field-group">
                    <label>Patologie</label>
                    <div class="btn-row">
                        <button class="cmd">Macchia</button>
                        <button class="cmd">Macchia di umidit&agrave;</button>
                        <button class="cmd">Umidit&agrave; con efflorescenza</button>
                        <button class="cmd">Distacco</button>
                        <button class="cmd">Distacco di intonaco</button>
                        <button class="cmd">Esfoliazione</button>
                        <button class="cmd">Gonfiamento</button>
                        <button class="cmd">Scrostatura</button>
                    </div>
                </div>
                <div class="field-group">
                    <label>Altro</label>
                    <div class="btn-row">
                        <button class="cmd">Mancanza</button>
                        <button class="cmd">Lacuna di materiale</button>
                        <button class="cmd">Efflorescenza</button>
                        <button class="cmd">Colonizzazione biologica</button>
                    </div>
                </div>
            </div>

            <!-- TAB: Andamento -->
            <div class="tab-panel" data-panel="andamento">
                <div class="field-group">
                    <label>Orientamento</label>
                    <div class="btn-row">
                        <button class="cmd">VT</button>
                        <button class="cmd">OZ</button>
                        <button class="cmd">DG</button>
                        <button class="cmd">DG alto SX</button>
                        <button class="cmd">DG alto DX</button>
                        <button class="cmd">DG basso SX</button>
                        <button class="cmd">DG basso DX</button>
                        <button class="cmd">pseudo VT</button>
                        <button class="cmd">pseudo OZ</button>
                        <button class="cmd">trasversale</button>
                        <button class="cmd">a tutta H</button>
                        <button class="cmd">breve estensione</button>
                    </div>
                </div>
                <div class="field-group">
                    <label>Specifiche</label>
                    <div class="btn-row">
                        <button class="cmd">Capillare</button>
                        <button class="cmd">Passante</button>
                        <button class="cmd">A Ragnatela</button>
                        <button class="cmd">Evidente</button>
                        <button class="cmd">Discontinua</button>
                        <button class="cmd">UT</button>
                        <button class="cmd">DD</button>
                        <button class="cmd">SX</button>
                        <button class="cmd">DX</button>
                        <button class="cmd">Alto</button>
                        <button class="cmd">Basso</button>
                    </div>
                </div>
            </div>

            <!-- TAB: Foto -->
            <div class="tab-panel" data-panel="foto">
                <div class="field-group">
                    <label>Foto Vano</label>
                    <div class="btn-row">
                        <button class="cmd primary">&#128247; Scatta Foto Vano</button>
                        <button class="cmd danger">Elimina Foto Vano</button>
                    </div>
                </div>
                <div class="field-group">
                    <label>Foto Difetto</label>
                    <div class="btn-row">
                        <button class="cmd primary">&#128247; Scatta Foto Difetto</button>
                        <button class="cmd danger">Elimina Foto Difetto</button>
                    </div>
                </div>
            </div>

            <!-- TAB: Finalizza -->
            <div class="tab-panel" data-panel="finalizza">
                <div class="field-group">
                    <div class="btn-row">
                        <button class="cmd primary" id="btn-chiusura">Chiusura</button>
                        <button class="cmd primary" id="btn-esporta-verbale">Esporta Verbale</button>
                        <button class="cmd" id="btn-esporta-foto">Esporta Allegato Foto</button>
                    </div>
                </div>
            </div>

        </div>
    </header>

    <!-- ============ DOCUMENTO (Foglio editabile) ============ -->
    <main id="documento">
        <div id="foglio" contenteditable="true" spellcheck="true">
        </div>
    </main>

    <script src="app.js"></script>
</body>
</html>
